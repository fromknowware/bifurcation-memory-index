name: Update stock data

on:
  schedule:
    # Every 15 min, Mon–Fri, 13:30–21:00 UTC (covers 9:30 AM–5 PM ET incl. pre/post)
    - cron: "0,15,30,45 13-20 * * 1-5"
    - cron: "30,45 13 * * 1-5"   # catch the 9:30 ET open precisely
  workflow_dispatch:              # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt --quiet

      - name: Fetch stock data
        run: python .github/scripts/fetch_stocks.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/stocks.json
          # only commit when the file actually changed
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "data: stocks refresh ${TIMESTAMP}"
            git push
          fi
